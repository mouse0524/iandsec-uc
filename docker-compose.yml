services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEB_BASE_IMAGE: ${WEB_BASE_IMAGE:-iandsec-uc-web-base:latest}
        APP_BASE_IMAGE: ${APP_BASE_IMAGE:-iandsec-uc-app-base:latest}
    container_name: iandsec-uc-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iandsec-user-center}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_BACKUP_DIRECTORY: ${DB_BACKUP_DIRECTORY:-/iandsec-db-backups}
      DB_BACKUP_MYSQL_CONTAINER: ${DB_BACKUP_MYSQL_CONTAINER:-iandsec-uc-mysql}
      DB_BACKUP_WEBDAV_BASE_URL: ${DB_BACKUP_WEBDAV_BASE_URL:-}
      DB_BACKUP_WEBDAV_USERNAME: ${DB_BACKUP_WEBDAV_USERNAME:-}
      DB_BACKUP_WEBDAV_PASSWORD: ${DB_BACKUP_WEBDAV_PASSWORD:-}
      DB_BACKUP_RUN_AT: ${DB_BACKUP_RUN_AT:-02:30}
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-7}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@admin.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD is required}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-1}
      TZ: Asia/Shanghai
    ports:
      - "3100:8080"
    volumes:
      # Bind mount release artifacts so routine git updates do not require rebuilding the image.
      - ./app:/opt/iandsec-uc/app
      - ./migrations:/opt/iandsec-uc/migrations
      - ./pyproject.toml:/opt/iandsec-uc/pyproject.toml
      - ./run.py:/opt/iandsec-uc/run.py
      - ./web:/opt/iandsec-uc/web
      - ./deploy/entrypoint.sh:/opt/iandsec-uc/entrypoint.sh
      - ./deploy/web.conf:/etc/nginx/sites-available/web.conf
      - ./deploy/security-headers.conf:/etc/nginx/snippets/security-headers.conf
      - app_storage:/opt/iandsec-uc/storage
      - app_logs:/opt/iandsec-uc/app/logs
      # Database backup uses docker exec to run mysqldump inside the MySQL container.
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: iandsec-uc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iandsec-user-center}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iandsec-uc-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_logs:
